<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArmasAI — Live PPO Training (MuJoCo-WASM)</title>
    <style>
      :root {
        --panel: #0e1418;
        --card: #161f27;
        --line: #2a3742;
        --fg: #dce6ee;
        --dim: #8aa0b0;
        --accent: #6fe6a0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        background: #11202e;
        font-family: -apple-system, Arial, sans-serif;
      }

      #caption {
        position: absolute;
        top: 14px;
        left: 14px;
        z-index: 10;
        color: var(--fg);
        background: rgba(0, 0, 0, 0.45);
        padding: 10px 14px;
        border-radius: 10px;
        line-height: 1.5;
        font-size: 14px;
        max-width: 420px;
        pointer-events: none;
      }
      #caption b {
        color: var(--accent);
      }
      #caption .sub {
        color: var(--dim);
        font-size: 12px;
      }

      /* Metrics show/hide icon (always visible, top-right) */
      #dash-toggle {
        position: absolute;
        top: 14px;
        right: 14px;
        z-index: 40;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--card);
        color: var(--fg);
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 17px;
        line-height: 1;
        cursor: pointer;
      }
      #dash-toggle:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* Right-side dashboard panel */
      #dash {
        position: absolute;
        top: 0;
        right: 0;
        z-index: 20;
        width: 380px;
        height: 100vh;
        background: var(--panel);
        border-left: 1px solid var(--line);
        color: var(--fg);
        overflow-y: auto;
        padding: 16px 16px 40px;
        transition: transform 0.25s ease;
      }
      #dash.hidden {
        transform: translateX(100%);
      }
      #dash h1 {
        font-size: 15px;
        margin: 6px 0 2px;
        letter-spacing: 0.3px;
      }
      #dash .meta {
        color: var(--dim);
        font-size: 12px;
        margin-bottom: 10px;
      }
      #bar {
        height: 6px;
        background: var(--card);
        border-radius: 4px;
        overflow: hidden;
        margin: 8px 0 4px;
      }
      #bar > div {
        height: 100%;
        width: 0%;
        background: var(--accent);
        transition: width 0.3s;
      }
      #reach {
        font-size: 13px;
        margin: 6px 0 14px;
        color: var(--dim);
      }
      #reach b {
        font-size: 20px;
      }
      #reset-btn {
        width: 100%;
        margin: 0 0 14px;
        padding: 9px 12px;
        background: var(--card);
        color: var(--fg);
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      #reset-btn:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
      }
      #reset-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 10px;
      }
      .card .row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .card .title {
        font-size: 12px;
        color: var(--dim);
      }
      .card .val {
        font-size: 17px;
        font-variant-numeric: tabular-nums;
      }
      .card canvas {
        width: 100%;
        height: 96px;
        display: block;
        margin-top: 6px;
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
    </style>
    <script
      async
      src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/",
          "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
        }
      }
    </script>
  </head>
  <body>
    <button id="dash-toggle" title="Show / hide metrics">▦</button>
    <div id="dash">
      <h1>
        <span class="dot" id="status-dot" style="background: #888"></span>PPO ·
        reach task
      </h1>
      <div class="meta" id="dash-meta">waiting for backend…</div>
      <div id="bar"><div id="bar-fill"></div></div>
      <div id="reach">fixed reach: <b id="reach-val">—</b></div>
      <button id="reset-btn">↻ Reset training</button>
      <div id="dash-cards"></div>
    </div>
    <script type="module" src="./src/live.js"></script>
  </body>
</html>
