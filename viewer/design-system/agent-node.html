<!-- @dsCard group="Pipeline" name="Agent Chip" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ARMASAI · Agent Chip</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#0a0a0f; --surface:#111118; --border:#2a2a3a; --accent:#00d4ff; --text:#e8e8f0; --text-muted:#6b6b80; --success:#22c55e; --warning:#f59e0b; --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); padding:28px; display:flex; flex-direction:column; gap:14px; }
  .cap { font-family:var(--mono); font-size:10px; color:var(--text-muted); letter-spacing:.08em; }
  .chip { width:230px; display:flex; align-items:center; gap:9px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:9px 11px; }
  .chip.focus { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .chip.running { border-color:var(--accent); box-shadow:0 0 18px rgba(0,212,255,.18); }
  .chip.done { border-color:#1f4a3a; }
  .chip.pending { border-style:dashed; }
  .ci { font-size:18px; }
  .cb { flex:1; min-width:0; display:flex; flex-direction:column; }
  .cn { font-size:12.5px; font-weight:600; }
  .ce { font-family:var(--mono); font-size:9.5px; color:var(--accent); }
  .dot { width:9px; height:9px; border-radius:50%; }
  .dot.i{background:#2a2a3a} .dot.r{background:var(--accent);box-shadow:0 0 0 4px rgba(0,212,255,.18)} .dot.d{background:var(--success)}
  .pb { font-family:var(--mono); font-size:8.5px; color:var(--warning); border:1px solid rgba(245,158,11,.4); background:rgba(245,158,11,.08); border-radius:4px; padding:1px 4px; }
  .conn { display:flex; align-items:center; gap:6px; }
  .conn i { width:18px; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; }
</style>
</head>
<body>
  <div class="cap">idle</div>
  <div class="chip"><span class="ci">🕶</span><span class="cb"><span class="cn">Capture</span><span class="ce">ADL clip</span></span><span class="dot i"></span></div>

  <div class="cap">running</div>
  <div class="chip running"><span class="ci">👁</span><span class="cb"><span class="cn">Perception</span><span class="ce">ProblemSpec</span></span><span class="dot r"></span></div>

  <div class="cap">done · focused</div>
  <div class="chip done focus"><span class="ci">🦾</span><span class="cb"><span class="cn">Design</span><span class="ce">DesignParams</span></span><span class="dot d"></span></div>

  <div class="cap">pending integration</div>
  <div class="chip pending"><span class="ci">🧪</span><span class="cb"><span class="cn">Simulation</span><span class="ce">EvalResult</span></span><span class="pb">PH</span></div>

  <div class="cap">linear path (chip → chip)</div>
  <div class="conn">
    <div class="chip done" style="width:150px"><span class="ci">👁</span><span class="cb"><span class="cn">Perception</span><span class="ce">ProblemSpec</span></span><span class="dot d"></span></div>
    <i></i>
    <div class="chip running" style="width:150px"><span class="ci">🦾</span><span class="cb"><span class="cn">Design</span><span class="ce">DesignParams</span></span><span class="dot r"></span></div>
  </div>
</body>
</html>
